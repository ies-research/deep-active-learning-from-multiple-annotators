_target_: src.scorer.KernelSmoothedBayesianGain

# Accuracy prior
accuracy_mean: 0.99
accuracy_strength: 1.0 # to be investigated

# Sample / annotator kernels
gamma_x: "median" # to be investigated
gamma_x_scope: "per_annotator" # to be investigated
gamma_a: "median"
use_annotator_embeddings: false
annotator_lambda: 1.0 # redundant when gamma_x=0, kept for consistency

# Channel model
channel_variant: "scalar_uniform_confusion"

# Latent class prior
class_prior: "uniform" # to be investigated
class_prior_strength: 1.0 # to be investigated
class_prior_lambda: 0.0 # only used when class_prior="kernel"
use_ess_class_prior: false
tau_class_prior: 1.0
sample_class_prior: false # to be investigated

# Posterior concentration / sampling
use_ess_beta: true
tau_beta: 1.0
n_theta_samples: 20
theta_ucb_quantile: null # use Beta posterior quantile when n_theta_samples <= 0

# Utility
gain_type: margin
