defaults:
  - profile@_here_: hard
  - _self_

_target_: src.dataset.CrowdSimConfig

seed: 5
n_annotators: 60
allocation: deterministic
missing_rate: 0.0
missing_value: -1

use_clusters: true
n_clusters: 28
kmeans_seed: 0
k_means_max_iter: 100
k_means_batch_size: 1024

use_difficulty: true
difficulty_k: 15
difficulty_metric: entropy
difficulty_alpha: 1.0
use_knn_ambiguity: true
knn_ambiguity_blend: 0.35
knn_ambiguity_min_samples: 5

# z_train caching (independent of embedder)
cache_dir: ${paths.crowd_cache_dir}
cache_version: 1
cache_store_metadata: true
