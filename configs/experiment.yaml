defaults:
  - al: dermamnist7
  - classifier: annot_mix
  - paths: default
  - dataset: dermamnist7
  - embedder@classification_embedder: clip
  - embedder@simulation_embedder: dinov2
  - pipeline: default
  - simulation: dermamnist7
  - module: mlp
  - training: default
  - scheduler: step_ratio_1
  - sample@sample.init: typi_clust
  - sample@sample.actual: falcun
  - scorer@scorer.init: random
  - scorer@scorer.actual: ks_big_channel
  - assigner@assigner.init: quota_sample
  - assigner@assigner.actual: greedy_sample
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled
  - _self_
experiment_name: "test"
results_path: ${paths.results_path}
device: "cpu"
missing_label: -1
exit_after_simulation: False
seed: 0
hydra:
  run:
    dir: .
  output_subdir: null
